<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa Livre</title>
    
    <script src="java.js"></script>
    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #1a91da 0%, #0056b3 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-banner {
            background-color: #f1c40f;
            width: 80%;
            margin-top: 20px;
            padding: 15px;
            text-align: center;
            border: 2px solid #000;
            font-weight: bold;
            font-size: 24px;
            text-transform: uppercase;
        }
        .main-container {
            width: 85%;
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
        }
        .left-panel {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }
        .right-panel {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .total-box {
            background-color: #ecf0f1;
            padding: 15px;
            text-align: right;
            font-weight: bold;
            font-size: 20px;
            border: 1px solid #bdc3c7;
        }
        .input-group {
            background-color: #bdc3c7;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        .input-group label {
            font-size: 12px;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .input-group input {
            padding: 8px;
            border: none;
            background-color: #ecf0f1;
            font-size: 16px;
            outline: none;
        }
        .btn-add {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
        }
        .btn-add:hover {
            background-color: #219150;
        }
    </style>
</head>
<body>

    <div class="header-banner">
        Caixa Livre
    </div>

    <div class="main-container">
        <div class="left-panel">
            Sua Compra
        </div>

        <div class="right-panel">
            <div class="total-box" id="total">
                Total: R$ 0.00
            </div>

            <div class="input-group">
                <label>Código de Barras</label>
                <input type="number" id="cod" autocomplete="off">
            </div>

            <div class="input-group">
                <label>Quantidade</label>
                <input type="number" id="qtd" value="1">
            </div>

            <div class="input-group">
                <label>Quantidade X Valor Unitário</label>
                <input type="text" id="display-valor" value="0.00" readonly>
            </div>

            <button class="btn-add" onclick="addProduto()">Adicionar Produto</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

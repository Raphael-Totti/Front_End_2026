<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogador da Copa do Mundo </title>
    <style>
        body, html {
        height: 100%;
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .bg-copa {
        background-image: url('img/FIFA-World-Cup-26.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        min-height: 100vh;
        display: flex;
        flex-direction: column; 
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

   
    #Cards {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap; 
        justify-content: center;
        gap: 30px; 
        margin-bottom: 40px; 
    }

    /* O Cartão do Jogador */
    .card {
        backdrop-filter: blur(8px);
        background-color: rgba(255, 255, 255, 0.95);
        border-radius: 15px; 
        box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        width: 320px;
        overflow: hidden; 
        transition: transform 0.3s ease;
    }

    .card:hover {
        transform: translateY(-10px); 
    }

   
    .card-img-top {
        width: 100%;
        height: 320px; 
        object-fit: cover; 
        background-color: #f1f2f6; 
    }

    /* Textos dentro do cartão */
    .card-body {
        padding: 25px;
    }

    .card-title {
        font-size: 1.4rem;
        margin: 0 0 15px 0;
        display: flex;
        justify-content: space-between; 
        align-items: center;
        color: #2f3542;
    }

    
    .badge {
        background-color: #3742fa;
        color: white;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: bold;
    }

    .card-text {
        font-size: 1rem;
        line-height: 1.8;
        color: #57606f;
        margin: 0;
    }

    
    .btn-primary {
        background-color: #2ed573;
        color: white;
        text-decoration: none;
        padding: 15px 30px;
        border-radius: 50px;
        font-weight: bold;
        font-size: 1.1rem;
        box-shadow: 0 5px 15px rgba(46, 213, 115, 0.4);
        border: none;
        cursor: pointer;
        transition: background-color 0.3s;
    }

    .btn-primary:hover {
        background-color: #26b360;
    }
        </style>
        <style> 
            body, html {
                height: 100%;
                margin: 0;
            }
            .bg-copa {
                background-image: url('FIFA-World-Cup-26.jpg');
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                
            }
            .card {
                backdrop-filter: blur(5px);
                background-color: rgba(255, 255, 255, 0.9);
                border: none;
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            }
    </style>
</head>
<body>

    <div class="bg-copa">
        <div  class="d-flex flex-collum justify-content-center">
            <div id="Cards" class="d-flex flex-row align-items-center">
                <div class="card" style="width: 22rem;" aria-hidden="true">
                    <img src="_vinicius_junior.png" class="card-img-top" alt="Placeholder Copa">

                    <div class="card-body">
                        <h5 id="Nome" class="card-title">
                            <span class="card-title">Vini JR.</span>
                            <span id="Rank" class="badge text-bg-secondary">9,5</span>
                        </h5>
                        <p class="card-text">
                            <span id="Data_Nas"><strong>Nascimento:</strong> 12/07/2000 </span><br>
                            <span id="Alutra"><strong>Altura:</strong> 1,76 </span><br>
                            <span id="Posição "><strong>Posição:</strong> Ponta-esquerda / Atacante</span><br>
                        </p>
                    </div>
                </div>

                
                
            </div>

        </div>
        <a href="#" onclick="add()" tabindex="-1" class="btn btn-primary" style="margin: 10px; padding: 10px;">
            Adcionar Novo Jogador
        </a>
    </div>
    </div>

    <script src="js\bootstrap.js"></script>
    <script src="script.js"></script>
</body>
</html>
